<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>ERC20 Balance Checker</title>
</head>
<body>
  <h2>ERC20 Balance (Sepolia)</h2>

  <button onclick="checkBalance()">Check My Balance</button>
  <p id="result"></p>

  <script src="https://cdn.jsdelivr.net/npm/ethers@6.13.2/dist/ethers.min.js"></script>

  <script>
    const tokenAddress = "YOUR_ERC20_CONTRACT_ADDRESS_HERE";

    const abi = [
      "function balanceOf(address owner) view returns (uint256)"
    ];

    async function checkBalance() {
      try {
        if (!window.ethereum) {
          document.getElementById("result").innerText = "MetaMask not installed";
          return;
        }

        const provider = new ethers.BrowserProvider(window.ethereum);
        await provider.send("eth_requestAccounts", []);

        const signer = await provider.getSigner();
        const userAddress = await signer.getAddress();

        const contract = new ethers.Contract(tokenAddress, abi, provider);

        const balance = await contract.balanceOf(userAddress);

        document.getElementById("result").innerText =
          "Balance: " + balance.toString();

      } catch (err) {
        document.getElementById("result").innerText = err.message;
      }
    }
  </script>
</body>
</html>
